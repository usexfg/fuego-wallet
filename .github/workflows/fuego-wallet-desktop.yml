          files: build/macos/Build/Products/Release/Fuego-Wallet-macOS-x86_64.zip

  build-windows:
    name: Build Fuego Wallet (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Copy Rust library to assets
        run: |
          New-Item -ItemType Directory -Force -Path assets\bin
          Copy-Item native\crypto\target\x86_64-pc-windows-msvc\release\fuego_crypto.dll assets\bin\fuego_crypto.dll

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Set up Boost environment
        run: |
          echo "LDFLAGS=-LC:\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV
          echo "CPPFLAGS=-IC:\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV
          echo "BOOST_ROOT=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Download xfg-stark-cli
        run: |
          curl -L -o xfg-stark-cli-windows.zip "https://github.com/ColinRitman/xfgwin/releases/download/v0.8.8/xfg-stark-cli-windows.zip"
          Expand-Archive -Path xfg-stark-cli-windows.zip -DestinationPath .
          New-Item -ItemType Directory -Force -Path assets\bin
          $binary = Get-ChildItem -Filter "xfg-stark-cli*.exe" -Recurse | Select-Object -First 1
          if ($binary) {
            Move-Item $binary.FullName assets\bin\xfg-stark-cli.exe
          } else {
            Write-Error "xfg-stark-cli executable not found after extraction"
            exit 1
          }
          Remove-Item xfg-stark-cli-windows.zip

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          cd C:/vcpkg
          .\bootstrap-vcpkg.bat

      - name: Install dependencies with vcpkg
        run: |
          C:/vcpkg/vcpkg.exe install --triplet x64-windows-static jsoncpp boost-system boost-filesystem boost-thread boost-date-time boost-chrono boost-regex boost-program-options openssl zeromq

      - name: Build fuego from source
        run: |
          # Clone HE4T branch
          git clone -b HE4T https://github.com/usexfg/fuego-suite.git fuego-source
          cd fuego-source

          # Fix json include path for HE4T branch to work with vcpkg
          if (Test-Path "src/CryptoNoteCore/ProofStructures.h") {
            (Get-Content src/CryptoNoteCore/ProofStructures.h) -replace '#include <json/json.h>', '#include <json/json.h>' | Set-Content src/CryptoNoteCore/ProofStructures.h
          }

          # Install build dependencies via vcpkg
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static -DBoost_USE_STATIC_LIBS=ON
          cmake --build . --config Release --target Crypto --target PaymentGateService

          # Copy binary to assets
          New-Item -ItemType Directory -Force -Path ..\\..\\assets\\bin
          # Find the walletd executable
          $walletdPath = Get-ChildItem -Path . -Recurse -Name "walletd.exe" -ErrorAction SilentlyContinue
          if ($walletdPath) {
            copy $walletdPath ..\\..\\assets\\bin\\fuego-walletd-windows.exe
          } else {
            Write-Warning "walletd.exe not found, looking for alternative names"
            $altPath = Get-ChildItem -Path . -Recurse -Name "*wallet*" -Include "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($altPath) {
              copy $altPath ..\\..\\assets\\bin\\fuego-walletd-windows.exe
            } else {
              Write-Error "No wallet executable found"
              exit 1
            }
          }

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build Windows desktop app
        run: flutter build windows --release

      - name: Create app archive
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            cd build\windows\x64\runner\Release
            Compress-Archive -Path * -DestinationPath ..\..\..\..\..\Fuego-Wallet-Windows.zip
          } else {
            Write-Error "Windows build output directory not found"
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-windows
          path: Fuego-Wallet-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: Fuego-Wallet-Windows.zip

  build-linux-compat:
    name: Build Fuego Wallet (Linux/Ubuntu 22)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-unknown-linux-gnu
          ls -la target/x86_64-unknown-linux-gnu/release/libfuego_crypto.so || exit 1

      - name: Copy Rust library to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/x86_64-unknown-linux-gnu/release/libfuego_crypto.so assets/bin/libfuego_crypto.so

      - name: Download xfg-stark-cli
        run: |
          curl -L -o xfg-stark-cli-linux.tar.gz "https://github.com/ColinRitman/xfgwin/releases/download/v0.8.8/xfg-stark-cli-linux.tar.gz"
          tar -xzf xfg-stark-cli-linux.tar.gz
          mkdir -p assets/bin
          BINARY_PATH=$(find . -type f -name "xfg-stark-cli*" -perm -111 | head -n1 || true)
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find . -type f -name "xfg-stark-cli*" | head -n1 || true)
          fi
          if [ -n "$BINARY_PATH" ]; then
            chmod +x "$BINARY_PATH"
            mv "$BINARY_PATH" assets/bin/xfg-stark-cli-linux
          else
            echo "xfg-stark-cli not found after extraction" >&2
            exit 1
          fi
          rm xfg-stark-cli-linux.tar.gz

      - name: Build fuego from source
        run: |
          # Clone HE4T branch
          git clone -b HE4T https://github.com/usexfg/fuego-suite.git fuego-source-build
          cd fuego-source-build

          # Patch CMakeLists.txt to remove system component and update for newer Boost
          sed -i 's/set(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt

          # Add Boost static linking compatibility
          echo 'set(Boost_USE_STATIC_LIBS ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_MULTITHREADED ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_STATIC_RUNTIME ON)' >> CMakeLists.txt

          # Install build dependencies (Ubuntu 22 has boost 1.74)
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost1.74-all-dev libssl-dev libzmq3-dev libjsoncpp-dev

          # Fix jsoncpp include path
          sed -i.bak "s/#include <jsoncpp\/json\/json.h>/#include <json\/json.h>/g" src/CryptoNoteCore/ProofStructures.h

          # Fix Crypto target configuration issues by commenting out problematic lines
          echo "Patching CMakeLists.txt to avoid Crypto target configuration issues..."
          sed -i .bak_crypto_fix '/target_compile_options(Crypto PRIVATE/d' src/CMakeLists.txt 2>/dev/null || echo "No target_compile_options lines found"
          sed -i .bak_crypto_fix2 '/target_compile_definitions(Crypto PRIVATE/d' src/CMakeLists.txt 2>/dev/null || echo "No target_compile_definitions lines found"

          # Create symlinks for jsoncpp headers if needed
          if [ -d "/usr/include/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/jsoncpp/json /usr/include/json
          elif [ -d "/usr/include/x86_64-linux-gnu/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/x86_64-linux-gnu/jsoncpp/json /usr/include/json
          fi

          # Build PaymentGateService (walletd) and other executables with proper flags
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT=/usr \
            -DBoost_INCLUDE_DIRS="/usr/include" \
            -DBoost_LIBRARY_DIRS="/usr/lib/x86_64-linux-gnu" \
            -DCMAKE_PREFIX_PATH="/usr" \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBoost_USE_MULTITHREADED=ON \
            -DBoost_USE_STATIC_RUNTIME=ON \
            -DCMAKE_BUILD_TYPE=Release

          make -j$(nproc) Crypto PaymentGateService

          # Find and copy walletd binary
          mkdir -p ../../assets/bin
          find . -name "walletd" -type f -executable -exec cp {} ../../assets/bin/fuego-walletd \;
          chmod +x ../../assets/bin/fuego-walletd

      - name: Enable Linux desktop support
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flutter config --enable-linux-desktop

      - name: Set up Boost environment
        run: |
          echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/usr/include" >> $GITHUB_ENV
          echo "BOOST_ROOT=/usr" >> $GITHUB_ENV

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build Linux desktop app (GLIBC 2.35)
        run: |
          flutter build linux --release

      - name: Create app archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf fuego-wallet-Linux-GLIBC-2.31.tar.gz *

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-linux-glibc-231
          path: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.31.tar.gz
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.31.tar.gz
          name: fuego-wallet-Linux-GLIBC-2.31.tar.gz

      - name: Create AppImage (GLIBC 2.35)
        run: |
          cd build/linux/x64/release/bundle
          # Install appimagetool
          curl -LO https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          # Copy icon from project root
          cp ../../../../../app_icon_256.png fuego_wallet.png || echo "Using placeholder icon"
          # Create desktop file for AppImage
          echo "[Desktop Entry]" > fuego_wallet.desktop
          echo "Version=1.0" >> fuego_wallet.desktop
          echo "Type=Application" >> fuego_wallet.desktop
          echo "Name=WinterFire Wallet" >> fuego_wallet.desktop
          echo "GenericName=Fuego's Winterfire Wallet" >> fuego_wallet.desktop
          echo "Comment=Decentralized Privacy Banking" >> fuego_wallet.desktop
          echo "Exec=fuego_wallet" >> fuego_wallet.desktop
          echo "Icon=fuego_wallet" >> fuego_wallet.desktop
          echo "Categories=Finance;Network;" >> fuego_wallet.desktop
          echo "Keywords=wallet;banking;fuego;xfg;" >> fuego_wallet.desktop
          echo "Terminal=false" >> fuego_wallet.desktop
          # Build AppImage
          ./appimagetool-x86_64.AppImage . fuego-wallet-Linux-GLIBC-2.35.AppImage
          # Clean up
          rm -f appimagetool-x86_64.AppImage

      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-linux-glibc-235-appimage
          path: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.35.AppImage
          retention-days: 30

      - name: Upload AppImage to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.35.AppImage
          name: fuego-wallet-Linux-GLIBC-2.35.AppImage

  build-linux-latest:
    name: Build Fuego Wallet (Linux/Ubuntu - Latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Download xfg-stark-cli
        run: |
          curl -L -o xfg-stark-cli-linux.tar.gz "https://github.com/ColinRitman/xfgwin/releases/download/v0.8.8/xfg-stark-cli-linux.tar.gz"
          tar -xzf xfg-stark-cli-linux.tar.gz
          mkdir -p assets/bin
          BINARY_PATH=$(find . -type f -name "xfg-stark-cli*" -perm -111 | head -n1 || true)
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find . -type f -name "xfg-stark-cli*" | head -n1 || true)
          fi
          if [ -n "$BINARY_PATH" ]; then
            chmod +x "$BINARY_PATH"
            mv "$BINARY_PATH" assets/bin/xfg-stark-cli-linux
          else
            echo "xfg-stark-cli not found after extraction" >&2
            exit 1
          fi
          rm xfg-stark-cli-linux.tar.gz

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Copy Rust library to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/x86_64-unknown-linux-gnu/release/libfuego_crypto.so assets/bin/libfuego_crypto.so

      - name: Build fuego from source
        run: |
          # Clone HE4T branch
          git clone -b HE4T https://github.com/usexfg/fuego-suite.git fuego-source-build
          cd fuego-source-build

          # Patch CMakeLists.txt to remove system component and update for newer Boost
          sed -i 's/set(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt

          # Add Boost static linking compatibility
          echo 'set(Boost_USE_STATIC_LIBS ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_MULTITHREADED ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_STATIC_RUNTIME ON)' >> CMakeLists.txt

          # Install build dependencies (Ubuntu 24.04 has boost 1.83)
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost1.83-all-dev libssl-dev libzmq3-dev libjsoncpp-dev

          # Fix jsoncpp include path
          sed -i.bak "s/#include <jsoncpp\/json\/json.h>/#include <json\/json.h>/g" src/CryptoNoteCore/ProofStructures.h

          # Fix Crypto target configuration issues by commenting out problematic lines
          echo "Patching CMakeLists.txt to avoid Crypto target configuration issues..."
          sed -i .bak_crypto_fix '/target_compile_options(Crypto PRIVATE/d' src/CMakeLists.txt 2>/dev/null || echo "No target_compile_options lines found"
          sed -i .bak_crypto_fix2 '/target_compile_definitions(Crypto PRIVATE/d' src/CMakeLists.txt 2>/dev/null || echo "No target_compile_definitions lines found"

          # Create symlinks for jsoncpp headers if needed
          if [ -d "/usr/include/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/jsoncpp/json /usr/include/json
          elif [ -d "/usr/include/x86_64-linux-gnu/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/x86_64-linux-gnu/jsoncpp/json /usr/include/json
          fi

          # Build PaymentGateService (walletd) and other executables with proper flags
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT=/usr \
            -DBoost_INCLUDE_DIRS="/usr/include" \
            -DBoost_LIBRARY_DIRS="/usr/lib/x86_64-linux-gnu" \
            -DCMAKE_PREFIX_PATH="/usr" \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBoost_USE_MULTITHREADED=ON \
            -DBoost_USE_STATIC_RUNTIME=ON \
            -DCMAKE_BUILD_TYPE=Release

          make -j$(nproc) Crypto PaymentGateService

          # Find and copy walletd binary
          mkdir -p ../../assets/bin
          find . -name "walletd" -type f -executable -exec cp {} ../../assets/bin/fuego-walletd \;
          chmod +x ../../assets/bin/fuego-walletd

      - name: Enable Linux desktop support
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flutter config --enable-linux-desktop

      - name: Set up Boost environment
        run: |
          echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/usr/include" >> $GITHUB_ENV
          echo "BOOST_ROOT=/usr" >> $GITHUB_ENV

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build Linux desktop app (Latest)
        run: |
          flutter build linux --release

      - name: Create app archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf fuego-wallet-Linux-Latest.tar.gz *

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-linux-latest
          path: build/linux/x64/release/bundle/fuego-wallet-Linux-Latest.tar.gz
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux-Latest.tar.gz
          name: fuego-wallet-Linux-Latest.tar.gz
