name: Fuego Wallet Desktop Build & Release

on:
  push:

    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "android/**"
      - "ios/**"
      - "macos/**"
      - "windows/**"
      - "linux/**"
      - "pubspec.yaml"
      - ".github/workflows/flutter-desktop.yml"
  pull_request:

    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "android/**"
      - "ios/**"
      - "macos/**"
      - "windows/**"
      - "linux/**"
      - "pubspec.yaml"
      - ".github/workflows/flutter-desktop.yml"
  workflow_dispatch:
  release:
    types: [published]
    permissions:
      contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: Build Fuego Wallet (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "native/crypto"

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
      - name: Copy Rust library to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/x86_64-apple-darwin/release/libfuego_crypto.dylib assets/bin/libfuego_crypto-x86_64.dylib || true
          cp native/crypto/target/aarch64-apple-darwin/release/libfuego_crypto.dylib assets/bin/libfuego_crypto-arm64.dylib || true
      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Download xfg-stark-cli
        run: |
          mkdir -p assets/bin
          curl -L -o assets/bin/xfg-stark-macos "https://github.com/usexfg/zk-fire/releases/download/v0.8.8/xfg-stark-cli-macos"
          chmod +x assets/bin/xfg-stark-macos
          curl -L -o assets/bin/fuego-prover-macos "https://github.com/usexfg/zk-fire/releases/latest/download/fuego-prover-macos"
          chmod +x assets/bin/fuego-prover-macos
      - name: Build fuego from source
        run: |
          # Clone xfgCdswaps branch
          git clone --recursive -b xfgCdswaps https://github.com/usexfg/fuego-suite.git fuego-source-build
          cd fuego-source-build
          # Patch CMakeLists.txt to remove system component and update Boost handling
          perl -i.bak -pe 's/set\(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options\)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt
          # Add compatibility for newer Boost versions
          echo 'set(Boost_USE_STATIC_LIBS ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_MULTITHREADED ON)' >> CMakeLists.txt
          # Install build dependencies - try boost@1.86 first, fall back to boost
          brew install cmake pkg-config zeromq jsoncpp openssl
          brew install boost
          # Determine Boost root and version
          export BOOST_ROOT=$(brew --prefix boost@1.86 2>/dev/null || brew --prefix boost 2>/dev/null || echo "/opt/homebrew")
          export BOOST_VERSION=$(brew list --versions boost 2>/dev/null | head -n1 | awk '{print $2}' || echo "unknown")
          echo "Using BOOST_ROOT: $BOOST_ROOT"
          echo "Boost version: $BOOST_VERSION"
          # Create symlinks for jsoncpp headers if needed
          if [ -d "/opt/homebrew/include/jsoncpp" ] && [ ! -d "/opt/homebrew/include/json" ]; then
            sudo ln -sf /opt/homebrew/include/jsoncpp/json /opt/homebrew/include/json
          elif [ -d "/usr/local/include/jsoncpp" ] && [ ! -d "/usr/local/include/json" ]; then
            sudo ln -sf /usr/local/include/jsoncpp/json /usr/local/include/json
          fi
          # Build PaymentGateService (walletd) and other executables
          mkdir build && cd build
          # CMake configuration with explicit Boost paths
          cmake .. -DBUILD_TESTS=OFF \
            -DCMAKE_PREFIX_PATH="$BOOST_ROOT" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_DIR="$BOOST_ROOT/lib/cmake/Boost-*" \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DBoost_USE_STATIC_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu) PaymentGateService
          # Find and copy walletd binary
          mkdir -p ../../assets/bin
          find . -name "walletd" -type f -executable -exec cp {} ../../assets/bin/fuego-walletd-macos \;
          chmod +x ../../assets/bin/fuego-walletd-macos
      - name: Install dependencies
        run: |
          # Fix any outdated dependencies first
          flutter pub upgrade --major-versions
          flutter pub get
          # Run dart fix for Flutter 3.24+ compatibility
          dart fix --apply
          flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build macOS desktop app
        run: |
          # Set environment variables for the build
          export FLUTTER_BUILD_DIR=build
          # Build with verbose output for debugging
          flutter build macos --release --verbose

      - name: Create app archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r Fuego-Wallet-macOS.zip "fuego_wallet.app"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          workspaces: "native/crypto"
          name: fuego-wallet-macos
          path: build/macos/Build/Products/Release/Fuego-Wallet-macOS.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/macos/Build/Products/Release/Fuego-Wallet-macOS.zip

  build-windows:
    name: Build Fuego Wallet (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "native/crypto"

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-pc-windows-msvc
      - name: Copy Rust library to assets
        run: |
          New-Item -ItemType Directory -Force -Path assets\bin
          Copy-Item native\crypto\target\x86_64-pc-windows-msvc\release\fuego_crypto.dll assets\bin\fuego_crypto.dll
      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Download xfg-stark-cli
        run: |
          New-Item -ItemType Directory -Force -Path assets\bin
          curl -L -o assets\bin\xfg-stark-windows.exe "https://github.com/usexfg/zk-fire/releases/download/v0.8.8/xfg-stark-cli-windows.exe"
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          cd C:/vcpkg
          .\bootstrap-vcpkg.bat
      - name: Install dependencies with vcpkg
        run: |
          C:/vcpkg/vcpkg.exe install --triplet x64-windows jsoncpp boost-system boost-filesystem boost-thread boost-date-time boost-chrono boost-regex boost-program-options openssl zeromq
      - name: Build fuego from source
        run: |
          # Clone xfgCdswaps branch
          git clone --recursive -b xfgCdswaps https://github.com/usexfg/fuego-suite.git fuego-source
          cd fuego-source
          # Fix json include path for xfgCdswaps branch to work with vcpkg
          if (Test-Path "src/CryptoNoteCore/ProofStructures.h") {
            (Get-Content src/CryptoNoteCore/ProofStructures.h) -replace '#include <json/json.h>', '#include <jsoncpp/json.h>' | Set-Content src/CryptoNoteCore/ProofStructures.h
            cat src/CryptoNoteCore/ProofStructures.h | Select-String json || $true
          }
          # Install build dependencies via vcpkg
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release --target PaymentGateService
          # Copy binary to assets
          New-Item -ItemType Directory -Force -Path ..\\..\\assets\\bin
          # Find the walletd executable
          $walletdPath = Get-ChildItem -Path . -Recurse -Name "walletd.exe" -ErrorAction SilentlyContinue
          if ($walletdPath) {
            copy $walletdPath ..\\..\\assets\\bin\\fuego-walletd-windows.exe
          } else {
            Write-Warning "walletd.exe not found, looking for alternative names"
            $altPath = Get-ChildItem -Path . -Recurse -Name "*wallet*" -Include "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($altPath) {
              copy $altPath ..\\..\\assets\\bin\\fuego-walletd-windows.exe
            } else {
              Write-Error "No wallet executable found"
              exit 1
            }
          }
      - name: Install dependencies
        run: |
          # Fix any outdated dependencies first
          flutter pub upgrade --major-versions
          flutter pub get
          # Fix theme compatibility issues for Flutter 3.24+
          dart fix --apply
          flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Fix theme compatibility issues
        run: |
          # Download fix script for theme API changes
          curl -o fix_theme.sh https://gist.githubusercontent.com/placeholder/fix_theme.sh 2>/dev/null || echo "Using manual fix"
          # Apply manual fixes
          perl -i.bak -pe 's/const CardTheme\(/const CardThemeData\(/g' lib/utils/theme.dart
          perl -i.bak -pe 's/const TabBarTheme\(/const TabBarThemeData\(/g' lib/utils/theme.dart

      - name: Build Windows desktop app
        run: flutter build windows --release

      - name: Create app archive
        run: |
          if (Test-Path "build\windows\runner\Release") {
            cd build\windows\runner\Release
            Compress-Archive -Path * -DestinationPath ..\..\..\..\Fuego-Wallet-Windows.zip
          } elseif (Test-Path "build\windows\x64\runner\Release") {
            cd build\windows\x64\runner\Release
            Compress-Archive -Path * -DestinationPath ..\..\..\..\..\Fuego-Wallet-Windows.zip
          } else {
            Get-ChildItem build -Recurse | Where-Object { $_.Name -like "*.exe" } | Select-Object -First 1 | ForEach-Object { Compress-Archive -Path $_.DirectoryName -DestinationPath "Fuego-Wallet-Windows.zip" }
          }
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          workspaces: "native/crypto"
          name: fuego-wallet-windows
          path: Fuego-Wallet-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: Fuego-Wallet-Windows.zip

  build-linux-compat:
    name: Build Fuego Wallet (Linux/Ubuntu 22)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "native/crypto"

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-unknown-linux-gnu
          # Verify binary was created
          ls -la target/x86_64-unknown-linux-gnu/release/libfuego_crypto.so || exit 1
      - name: Copy Rust library to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/x86_64-unknown-linux-gnu/release/libfuego_crypto.so assets/bin/libfuego_crypto.so
      - name: Download xfg-stark-cli
        run: |
          mkdir -p assets/bin
          curl -L -o assets/bin/xfg-stark-linux "https://github.com/usexfg/zk-fire/releases/download/v0.8.8/xfg-stark-cli-linux"
          chmod +x assets/bin/xfg-stark-linux
          curl -L -o assets/bin/fuego-prover-linux "https://github.com/usexfg/zk-fire/releases/latest/download/fuego-prover-linux"
          chmod +x assets/bin/fuego-prover-linux
      - name: Build fuego from source
        run: |
          # Clone xfgCdswaps branch
          git clone --recursive -b xfgCdswaps https://github.com/usexfg/fuego-suite.git fuego-source-build
          cd fuego-source-build
          # Patch CMakeLists.txt to remove system component and update for newer Boost
          perl -i.bak -pe 's/set\(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options\)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt
          # Add Boost static linking compatibility
          echo 'set(Boost_USE_STATIC_LIBS ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_MULTITHREADED ON)' >> CMakeLists.txt
          # Install build dependencies (Ubuntu 22 has boost 1.74)
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost1.74-all-dev libssl-dev libzmq3-dev libjsoncpp-dev
          # Create symlinks for jsoncpp headers if needed
          if [ -d "/usr/include/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/jsoncpp/json /usr/include/json
          elif [ -d "/usr/include/x86_64-linux-gnu/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/x86_64-linux-gnu/jsoncpp/json /usr/include/json
          fi
          # Build PaymentGateService (walletd) and other executables with proper flags
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBOOST_ROOT=/usr \
            -DCMAKE_PREFIX_PATH="/usr" \
            -DBoost_DIR="/usr/lib/cmake/Boost-1.74.0" \
            -DBoost_USE_STATIC_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) PaymentGateService
          # Find and copy walletd binary
          mkdir -p ../../assets/bin
          find . -name "walletd" -type f -executable -exec cp {} ../../assets/bin/fuego-walletd \;
          chmod +x ../../assets/bin/fuego-walletd
      - name: Enable Linux desktop support
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flutter config --enable-linux-desktop
      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build Linux desktop app (GLIBC 2.35)
        run: |
          flutter build linux --release
          # Create a portable build by copying required libraries
          cd build/linux/x64/release/bundle
          mkdir -p lib
          # Copy system libraries for better compatibility
          cp /lib/x86_64-linux-gnu/libc.so.6 lib/ 2>/dev/null || echo "libc.so.6 not found"
          cp /usr/lib/x86_64-linux-gnu/libstdc++.so.6 lib/ 2>/dev/null || echo "libstdc++.so.6 not found"
          # Create a wrapper script that uses bundled libraries
          cat > run_xfg_wallet.sh << 'EOF'
          #!/bin/bash
          export LD_LIBRARY_PATH="$(dirname "$0")/lib:$LD_LIBRARY_PATH"
          exec "$(dirname "$0")/fuego_wallet" "$@"
          EOF
          chmod +x run_xfg_wallet.sh
      - name: Create app archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf fuego-wallet-Linux-GLIBC-2.31.tar.gz *
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          workspaces: "native/crypto"
          name: fuego-wallet-linux-glibc-231
          path: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.31.tar.gz
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.31.tar.gz
          name: fuego-wallet-Linux-GLIBC-2.31.tar.gz

      - name: Create AppImage (GLIBC 2.35)
        run: |
          cd build/linux/x64/release/bundle
          # Install appimagetool
          curl -LO https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          # Copy icon from project root (build starts from bundle dir, so go 5 levels up)
          cp ../../../../../app_icon_256.png fuego_wallet.png || echo "Using placeholder icon"
          # Create desktop file for AppImage
          cat > fuego_wallet.desktop << 'EOF'
            [Desktop Entry]
            Version=1.0
            Type=Application
            Name=WinterFire Wallet
            GenericName=Fuego's Winterfire Wallet
            Comment=Decentralized Privacy Banking
            Exec=fuego_wallet
            Icon=fuego_wallet
            Categories=Finance;Network;
            Keywords=wallet;banking;fuego;xfg;
            Terminal=false
            EOF
          # Build AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage . fuego-wallet-Linux-GLIBC-2.35.AppImage
          # Clean up
          rm -f appimagetool-x86_64.AppImage
      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-linux-glibc-235-appimage
          path: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.35.AppImage
          retention-days: 30

      - name: Upload AppImage to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux-GLIBC-2.35.AppImage
          name: fuego-wallet-Linux-GLIBC-2.35.AppImage

  build-linux-latest:
    name: Build Fuego Wallet (Linux/Ubuntu - Latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Download xfg-stark-cli
        run: |
          mkdir -p assets/bin
          curl -L -o assets/bin/xfg-stark-linux "https://github.com/usexfg/zk-fire/releases/download/v0.8.8/xfg-stark-cli-linux"
          chmod +x assets/bin/xfg-stark-linux
          curl -L -o assets/bin/fuego-prover-linux "https://github.com/usexfg/zk-fire/releases/latest/download/fuego-prover-linux"
          chmod +x assets/bin/fuego-prover-linux
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "native/crypto"

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-unknown-linux-gnu
      - name: Copy Rust library to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/x86_64-unknown-linux-gnu/release/libfuego_crypto.so assets/bin/libfuego_crypto.so
      - name: Build fuego from source
        run: |
          # Clone xfgCdswaps branch
          git clone --recursive -b xfgCdswaps https://github.com/usexfg/fuego-suite.git fuego-source-build
          cd fuego-source-build
          # Patch CMakeLists.txt to remove system component and update for newer Boost
          perl -i.bak -pe 's/set\(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options\)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt
          # Add Boost static linking compatibility
          echo 'set(Boost_USE_STATIC_LIBS ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_MULTITHREADED ON)' >> CMakeLists.txt
          # Install build dependencies (Ubuntu 24.04 has boost 1.83)
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost1.83-all-dev libssl-dev libzmq3-dev libjsoncpp-dev
          # Create symlinks for jsoncpp headers if needed
          if [ -d "/usr/include/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/jsoncpp/json /usr/include/json
          elif [ -d "/usr/include/x86_64-linux-gnu/jsoncpp" ] && [ ! -d "/usr/include/json" ]; then
            sudo ln -sf /usr/include/x86_64-linux-gnu/jsoncpp/json /usr/include/json
          fi
          # Build PaymentGateService (walletd) and other executables with proper flags
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF -DBoost_NO_BOOST_CMAKE=ON -DBOOST_ROOT=/usr -DCMAKE_PREFIX_PATH="/usr"
          make -j$(nproc) PaymentGateService
          # Find and copy walletd binary
          mkdir -p ../../assets/bin
          find . -name "walletd" -type f -executable -exec cp {} ../../assets/bin/fuego-walletd \;
          chmod +x ../../assets/bin/fuego-walletd
      - name: Enable Linux desktop support
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flutter config --enable-linux-desktop
      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build Linux desktop app (Latest)
        run: |
          flutter clean
          flutter pub get
          dart fix --apply
          flutter build linux --release --verbose

      - name: Create app archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf fuego-wallet-Linux-Latest.tar.gz *
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          workspaces: "native/crypto"
          name: fuego-wallet-linux-latest
          path: build/linux/x64/release/bundle/fuego-wallet-Linux-Latest.tar.gz
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux-Latest.tar.gz
          name: fuego-wallet-Linux-Latest.tar.gz
      - name: Download fuego-prover
        run: |
          curl -L -o fuego-prover-linux "https://github.com/usexfg/zk-fire/releases/latest/download/fuego-prover-linux"
          chmod +x fuego-prover-linux
          mkdir -p assets/bin
          mv fuego-prover-linux assets/bin/
