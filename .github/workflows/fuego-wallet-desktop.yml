name: Fuego Wallet Desktop Build & Release

on:
  push:
    branches: [HEATMINT, master]
    paths:
      - "lib/**"
      - "android/**"
      - "ios/**"
      - "macos/**"
      - "windows/**"
      - "linux/**"
      - "pubspec.yaml"
      - ".github/workflows/fuego-wallet-desktop.yml"
  pull_request:
    branches: [HEATMINT, master]
    paths:
      - "lib/**"
      - "android/**"
      - "ios/**"
      - "macos/**"
      - "windows/**"
      - "linux/**"
      - "pubspec.yaml"
      - ".github/workflows/fuego-wallet-desktop.yml"
  workflow_dispatch:
  release:
    types: [published]
    permissions:
      contents: write

jobs:
  build-macos-arm64:
    name: Build Fuego Wallet (macOS ARM64)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Copy Rust library to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/x86_64-apple-darwin/release/libfuego_crypto.dylib assets/bin/libfuego_crypto-x86_64.dylib || true
          cp native/crypto/target/aarch64-apple-darwin/release/libfuego_crypto.dylib assets/bin/libfuego_crypto-arm64.dylib || true

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Set up Boost environment
        run: |
          brew install boost@1.85
          echo "LDFLAGS=-L$(brew --prefix boost@1.85)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix boost@1.85)/include" >> $GITHUB_ENV
          echo "BOOST_ROOT=$(brew --prefix boost@1.85)" >> $GITHUB_ENV
          echo "BOOST_LIBRARYDIR=$(brew --prefix boost@1.85)/lib" >> $GITHUB_ENV
          echo "BOOST_INCLUDEDIR=$(brew --prefix boost@1.85)/include" >> $GITHUB_ENV

      - name: Set up macOS ARM64 environment
        run: |
          echo "ARCHS=arm64" >> $GITHUB_ENV
          echo "CMAKE_OSX_ARCHITECTURES=arm64" >> $GITHUB_ENV

      - name: Download xfg-stark-cli
        run: |
          curl -L -o xfg-stark-cli-macos.tar.gz "https://github.com/ColinRitman/xfgwin/releases/download/v0.8.8/xfg-stark-cli-macos.tar.gz"
          tar -xzf xfg-stark-cli-macos.tar.gz
          mkdir -p assets/bin
          BINARY_PATH=$(find . -type f -name "xfg-stark-cli*" -perm +111 | head -n1 || true)
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find . -type f -name "xfg-stark-cli*" | head -n1 || true)
          fi
          if [ -n "$BINARY_PATH" ]; then
            chmod +x "$BINARY_PATH"
            mv "$BINARY_PATH" assets/bin/xfg-stark-cli-macos
          else
            echo "xfg-stark-cli not found after extraction" >&2
            exit 1
          fi
          rm xfg-stark-cli-macos.tar.gz

      - name: Build fuego from source
        run: |
          # Clone HE4T branch
          git clone -b HE4T https://github.com/usexfg/fuego-suite.git fuego-source-build
          cd fuego-source-build

          # Patch CMakeLists.txt to remove system component and update Boost handling
          sed -i.bak 's/set(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt

          # Add compatibility for newer Boost versions
          echo 'set(Boost_USE_STATIC_LIBS ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_MULTITHREADED ON)' >> CMakeLists.txt
          echo 'set(Boost_USE_STATIC_RUNTIME ON)' >> CMakeLists.txt

          # Install build dependencies - use boost@1.85 specifically
          brew install cmake pkg-config zeromq jsoncpp openssl@3 boost@1.85

          # Set Boost environment variables
          export BOOST_ROOT=$(brew --prefix boost@1.85)
          export BOOST_LIBRARYDIR=$BOOST_ROOT/lib
          export BOOST_INCLUDEDIR=$BOOST_ROOT/include
          export CMAKE_PREFIX_PATH="$BOOST_ROOT:/opt/homebrew/opt/openssl@3:/opt/homebrew/opt/icu4c"
          echo "Using BOOST_ROOT: $BOOST_ROOT"

          # Fix jsoncpp include path
          sed -i .bak2 "s/#include <jsoncpp\/json\/json.h>/#include <json\/json.h>/g" src/CryptoNoteCore/ProofStructures.h

          # Remove x86-specific flags for ARM64 compatibility
          sed -i .bak3 "s/-maes//g; s/-msse2//g; s/-msse4.1//g; s/-msse4.2//g" CMakeLists.txt

          # Fix Crypto target configuration issues by commenting out problematic lines
          echo "Patching CMakeLists.txt to avoid Crypto target configuration issues..."
          sed -i .bak_crypto_fix '/target_compile_options(Crypto PRIVATE/d' src/CMakeLists.txt 2>/dev/null || echo "No target_compile_options lines found"
          sed -i .bak_crypto_fix2 '/target_compile_definitions(Crypto PRIVATE/d' src/CMakeLists.txt 2>/dev/null || echo "No target_compile_definitions lines found"

          # Create symlinks for jsoncpp headers if needed
          if [ -d "/opt/homebrew/include/jsoncpp" ] && [ ! -d "/opt/homebrew/include/json" ]; then
            sudo ln -sf /opt/homebrew/include/jsoncpp/json /opt/homebrew/include/json
          elif [ -d "/usr/local/include/jsoncpp" ] && [ ! -d "/usr/local/include/json" ]; then
            sudo ln -sf /usr/local/include/jsoncpp/json /usr/local/include/json
          fi

          # Build PaymentGateService (walletd) and other executables
          mkdir build && cd build

          # CMake configuration with explicit Boost paths
          cmake .. -DBUILD_TESTS=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_PREFIX_PATH="$BOOST_ROOT:/opt/homebrew/opt/openssl@3:/opt/homebrew/opt/icu4c" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DBoost_INCLUDE_DIRS="$BOOST_ROOT/include" \
            -DBoost_LIBRARY_DIRS="$BOOST_ROOT/lib" \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBoost_USE_MULTITHREADED=ON \
            -DBoost_USE_STATIC_RUNTIME=ON \
            -DOPENSSL_ROOT_DIR="/opt/homebrew/opt/openssl@3" \
            -DICU_ROOT="/opt/homebrew/opt/icu4c" \
            -DCMAKE_BUILD_TYPE=Release

          make -j$(sysctl -n hw.ncpu) Crypto PaymentGateService

          # Find and copy walletd binary
          mkdir -p ../../assets/bin
          find . -name "walletd" -type f -executable -exec cp {} ../../assets/bin/fuego-walletd-macos \;
          chmod +x ../../assets/bin/fuego-walletd-macos

          # Also create ARM64-specific copy
          cp ../../assets/bin/fuego-walletd-macos ../../assets/bin/fuego-walletd-macos-arm64
          chmod +x ../../assets/bin/fuego-walletd-macos-arm64

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build macOS desktop app
        run: |
          flutter build macos --release

      - name: Create app archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r Fuego-Wallet-macOS-ARM64.zip "fuego_wallet.app"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-macos-arm64
          path: build/macos/Build/Products/Release/Fuego-Wallet-macOS-ARM64.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/macos/Build/Products/Release/Fuego-Wallet-macOS-ARM64.zip

  build-macos-x86:
    name: Build Fuego Wallet (macOS x86_64)
