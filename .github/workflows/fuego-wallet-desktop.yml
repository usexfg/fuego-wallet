            cp native/crypto/target/x86_64-apple-darwin/release/libfuego_crypto.a assets/bin/libfuego_crypto-x86_64.a
          fi
          if [ -f "native/crypto/target/x86_64-apple-darwin/release/libfuego_crypto.dylib" ]; then
