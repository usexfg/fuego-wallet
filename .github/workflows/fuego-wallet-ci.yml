name: Fuego Wallet CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: fuego-wallet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 25
    needs: analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Fix stale komodo references in SDK
        run: |
          echo "=== Checking submodule _komodo_index.dart ==="
          head -10 sdk/packages/fuego_cex_market_data/lib/src/fuego/_komodo_index.dart
          find sdk/packages -name "*.dart" -not -path "*/test/*" -not -path "*/.dart_tool/*" -not -path "*/example/*" | \
          while read f; do
            sed -i '' 's/src\/komodo\//src\/fuego\//g' "$f"
            sed -i '' "s/'komodo\//'fuego\//g" "$f"
            sed -i '' 's/komodo_price_provider/fuego_price_provider/g' "$f"
            sed -i '' 's/komodo_price_repository/fuego_price_repository/g' "$f"
            sed -i '' 's/komodo_defi_sdk\.dart/fuego_defi_sdk.dart/g' "$f"
            sed -i '' 's/komodo_defi_framework_bindings_generated/fuego_defi_framework_bindings_generated/g' "$f"
          done
          echo "=== After fix ==="
          head -10 sdk/packages/fuego_cex_market_data/lib/src/fuego/_komodo_index.dart

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package app

      - name: Package app
        run: |
          cd build/macos/Build/Products/Release
          zip -r Fuego-Wallet-macOS.zip "fuego_wallet.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-macos
          path: build/macos/Build/Products/Release/Fuego-Wallet-macOS.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/Fuego-Wallet-macOS.zip
