name: Fuego Wallet CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: fuego-wallet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 25
    needs: analyze

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with: { toolchain: stable }

      - name: Build Rust backend
        working-directory: rust-fuego-wallet
        run: cargo build --release

      - name: Build macOS app
        run: flutter build macos --release

      - name: Bundle Rust backend into app
        run: |
          APP="build/macos/Build/Products/Release/fuego_wallet.app"
          cp rust-fuego-wallet/target/release/fuego-wallet "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/fuego-wallet"

      - name: Re-sign
        run: |
          APP="build/macos/Build/Products/Release/fuego_wallet.app"
          codesign --force --sign - "$APP/Contents/MacOS/fuego-wallet" 2>/dev/null || true
          find "$APP/Contents/Frameworks" -mindepth 1 -maxdepth 1 -type d -name "*.framework" -exec codesign --force --sign - {} \;
          codesign --force --sign - "$APP"

      - name: Package app
        run: |
          cd build/macos/Build/Products/Release
          zip -r Fuego-Wallet-macOS.zip "fuego_wallet.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-macos
          path: build/macos/Build/Products/Release/Fuego-Wallet-macOS.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/Fuego-Wallet-macOS.zip
