name: fuego-wallet Android Build & Release (Embedded SDK)

on:
  push:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "android/**"
      - "fuego-sdk/**"
      - "pubspec.yaml"
      - ".github/workflows/android-release.yml"
  pull_request:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "android/**"
      - "fuego-sdk/**"
      - "pubspec.yaml"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      upload_to_play_store:
        description: "Upload to Play Store"
        required: false
        default: false
        type: boolean
  release:
    types: [published]
    permissions:
      contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.27.0"
  FUEGO_SOURCE_BRANCH: "hearth"

jobs:
  build-android:
    name: Build fuego-wallet (Android)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Enable Android support
        run: flutter config --enable-android

      - name: Ensure Binaries
        run: chmod +x scripts/ensure-binaries.sh && ./scripts/ensure-binaries.sh

      - name: Build Fuego Core & SDK (Android)
        run: |
          # Clone Fuego Core
          git clone -b ${{ env.FUEGO_SOURCE_BRANCH }} https://github.com/usexfg/fuego-suite.git fuego-core
          cd fuego-core
          git submodule update --init --recursive
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake libboost-all-dev libjsoncpp-dev libssl-dev libzmq3-dev
          
          # Patch for jsoncpp compatibility
          sed -i 's/#include <json\/json.h>/#include <jsoncpp\/json.h>/g' src/CryptoNoteCore/ProofStructures.h
          
          # Build Core Libraries (Generic Linux for SDK linkage)
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          
          # Build SDK Library
          cd ../../fuego-sdk
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DFUEGO_DIR=../../fuego-core
          make -j$(nproc)
          
          # Copy SDK to assets
          mkdir -p ../../assets/bin
          cp libfuego_sdk.so ../../assets/bin/libfuego_sdk-android.so

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Analyze code
        run: flutter analyze

      - name: Setup Android keystore
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "storeFile=keystore.jks" >> android/key.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties

      - name: Build APK (Debug)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug')
        run: flutter build apk --debug

      - name: Build APK (Release)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd android
          ./gradlew assembleRelease
          cd ..

      - name: Build AAB (Release)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd android
          ./gradlew bundleRelease
          cd ..

      - name: Sign APK with apksigner
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android/app/keystore.jks \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out build/app/outputs/flutter-apk/app-release-signed.apk \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Verify APK signature
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify build/app/outputs/flutter-apk/app-release-signed.apk

      - name: Create APK archive
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd build/app/outputs/flutter-apk
          if [ -f app-release-signed.apk ]; then
            cp app-release-signed.apk fuego-wallet-Android-Release.apk
          else
            cp app-release.apk fuego-wallet-Android-Release.apk
          fi
          zip -r fuego-wallet-Android-Release.zip fuego-wallet-Android-Release.apk

      - name: Create AAB archive
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd build/app/outputs/bundle/release
          cp app-release.aab fuego-wallet-Android-Release.aab
          zip -r fuego-wallet-Android-Release-AAB.zip fuego-wallet-Android-Release.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-android-apk
          path: |
            build/app/outputs/flutter-apk/fuego-wallet-Android-Release.zip
            build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload AAB artifacts
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-android-aab
          path: build/app/outputs/bundle/release/fuego-wallet-Android-Release-AAB.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            build/app/outputs/flutter-apk/fuego-wallet-Android-Release.zip
            build/app/outputs/bundle/release/fuego-wallet-Android-Release-AAB.zip
          tag_name: ${{ github.ref_name }}
          name: fuego-wallet Android Release ${{ github.ref_name }}

  upload-to-play-store:
    name: Upload to Play Store
    runs-on: ubuntu-22.04
    needs: build-android
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_play_store == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-android-aab
          path: ./artifacts

      - name: Extract AAB
        run: |
          cd artifacts
          unzip fuego-wallet-Android-Release-AAB.zip
          cd ..

      - name: Setup Google Play Console API
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fuego.fuego_wallet
          releaseFiles: artifacts/fuego-wallet-Android-Release.aab
          track: production
          status: completed
          inAppUpdatePriority: 2
          userFraction: 1.0

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    needs: build-android
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-android-apk
          path: ./artifacts

      - name: Extract APK
        run: |
          cd artifacts
          unzip fuego-wallet-Android-Release.zip
          cd ..

      - name: Run MobSF Security Scan
        uses: MobSF/MobSF-Action@v1.0.0
        with:
          file: artifacts/fuego-wallet-Android-Release.apk
          mobsf_url: ${{ secrets.MOBSF_URL }}
          mobsf_api_key: ${{ secrets.MOBSF_API_KEY }}

  notify-release:
    name: Notify Release
    runs-on: ubuntu-22.04
    needs: [build-android, upload-to-play-store]
    if: always() && github.event_name == 'release'

    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            🚀 **fuego-wallet Android Release ${{ github.ref_name }}**

            ✅ Android APK and AAB builds completed
            📱 Ready for distribution
            🔗 [Download from GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})

            **Build Details:**
            - Version: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}

      - name: Create Release Summary
        run: |
          echo "## fuego-wallet Android Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Android APK: Built and signed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Android AAB: Built and signed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security scan: Completed" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.upload-to-play-store.result }}" == "success" ]; then
            echo "- ✅ Play Store: Uploaded successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Play Store: Upload skipped or failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Android APK](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fuego-wallet-Android-Release.zip)" >> $GITHUB_STEP_SUMMARY
          echo "- [Android AAB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fuego-wallet-Android-Release-AAB.zip)" >> $GITHUB_STEP_SUMMARY
