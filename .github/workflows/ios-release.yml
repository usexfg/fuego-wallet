name: fuego-wallet iOS Build & Release (Embedded SDK)

on:
  push:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "ios/**"
      - "fuego-sdk/**"
      - "pubspec.yaml"
      - ".github/workflows/ios-release.yml"
  pull_request:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "ios/**"
      - "fuego-sdk/**"
      - "pubspec.yaml"
      - ".github/workflows/ios-release.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      upload_to_testflight:
        description: "Upload to TestFlight"
        required: false
        default: false
        type: boolean
      upload_to_app_store:
        description: "Upload to App Store"
        required: false
        default: false
        type: boolean
  release:
    types: [published]
    permissions:
      contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.27.0"
  IOS_BUNDLE_ID: "com.fuego.fuego_wallet"
  IOS_SCHEME: "Runner"
  FUEGO_SOURCE_BRANCH: "hearth"

jobs:
  build-ios:
    name: Build fuego-wallet (iOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Enable iOS support
        run: flutter config --enable-ios

      - name: Ensure Binaries
        run: chmod +x scripts/ensure-binaries.sh && ./scripts/ensure-binaries.sh

      - name: Build Fuego Core & SDK (iOS)
        run: |
          git clone -b ${{ env.FUEGO_SOURCE_BRANCH }} https://github.com/usexfg/fuego-suite.git fuego-core
          cd fuego-core
          git submodule update --init --recursive
          # Patch Boost
          sed -i '' 's/set(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt
          brew install cmake pkg-config openssl zeromq jsoncpp
          
          # Install Boost 1.83 (last version with io_service alias) 
          BOOST_VERSION=1.83.0
          curl -L -o boost.tar.gz "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_$(echo $BOOST_VERSION | tr '.' '_').tar.gz"
          tar xzf boost.tar.gz
          cd boost_*
          ./bootstrap.sh --with-libraries=system,filesystem,thread,date_time,chrono,regex,serialization,program_options
          sudo ./b2 -j$(sysctl -n hw.ncpu) variant=release link=static install
          cd ..
          
          # Fix jsoncpp include dir (macOS Homebrew puts headers in include/ not include/json/)
          sed -i '' 's|/include/json")|/include")|g' CMakeLists.txt
          # Fix SimpleWallet.cpp: generate_signature missing PublicKey arg (AccountKeys.address.spendPublicKey)
          sed -i '' 's|Crypto::generate_signature(challenge, keys\.spendSecretKey, proof);|Crypto::generate_signature(challenge, keys.address.spendPublicKey, keys.spendSecretKey, proof);|' src/SimpleWallet/SimpleWallet.cpp
          sed -i '' 's|Crypto::generate_signature(challenge, keys2\.spendSecretKey, proof);|Crypto::generate_signature(challenge, keys2.address.spendPublicKey, keys2.spendSecretKey, proof);|' src/SimpleWallet/SimpleWallet.cpp
          # Add missing Blockchain::removeAlias and replaceAliasOwnership stubs
          sed -i '' '$ d' src/CryptoNoteCore/Blockchain.cpp
          echo "" >> src/CryptoNoteCore/Blockchain.cpp
          echo "bool Blockchain::removeAlias(const std::string& alias) {" >> src/CryptoNoteCore/Blockchain.cpp
          echo "  return true;" >> src/CryptoNoteCore/Blockchain.cpp
          echo "}" >> src/CryptoNoteCore/Blockchain.cpp
          echo "" >> src/CryptoNoteCore/Blockchain.cpp
          echo "bool Blockchain::replaceAliasOwnership(const std::string& alias, const Crypto::Hash& newAddressHash) {" >> src/CryptoNoteCore/Blockchain.cpp
          echo "  return true;" >> src/CryptoNoteCore/Blockchain.cpp
          echo "}" >> src/CryptoNoteCore/Blockchain.cpp
          echo "" >> src/CryptoNoteCore/Blockchain.cpp
          echo "}  // namespace CryptoNote" >> src/CryptoNoteCore/Blockchain.cpp
          # Build Core
          mkdir build && cd build
          CXXFLAGS="-DBOOST_MPL_CFG_NO_PREPROCESSED_HEADERS -DBOOST_MPL_LIMIT_LIST_SIZE=50"
          export CXXFLAGS
          echo 'add_definitions(-DBOOST_MPL_CFG_NO_PREPROCESSED_HEADERS -DBOOST_MPL_LIMIT_LIST_SIZE=50)' > ../CMakeLists.txt.new && cat ../CMakeLists.txt >> ../CMakeLists.txt.new && mv ../CMakeLists.txt.new ../CMakeLists.txt
          cmake .. -DBUILD_TESTS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_BUILD_TYPE=Release -DBoost_USE_STATIC_LIBS=ON -DCMAKE_CXX_FLAGS_INIT="-DBOOST_MPL_CFG_NO_PREPROCESSED_HEADERS -DBOOST_MPL_LIMIT_LIST_SIZE=50"
          make -j$(sysctl -n hw.ncpu)
          
          # Build SDK
          cd ../../fuego-sdk
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DFUEGO_DIR=../../fuego-core -DBOOST_ROOT=/usr/local -DBoost_USE_STATIC_LIBS=ON -DBoost_NO_SYSTEM_PATHS=ON
          make -j$(sysctl -n hw.ncpu)
          
          # Copy SDK
          mkdir -p ../../assets/bin
          cp libfuego_sdk.dylib ../../assets/bin/libfuego_sdk-ios.dylib

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Analyze code
        run: flutter analyze

      - name: Setup iOS certificates and provisioning profiles
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Setup iOS provisioning profile
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: ${{ env.IOS_BUNDLE_ID }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Build iOS app (Debug)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug')
        run: |
          flutter build ios --debug --no-codesign

      - name: Build iOS app (Release)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          flutter build ios --release --no-codesign

      - name: Archive iOS app
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/Runner.xcarchive \
            archive

      - name: Export IPA
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist

      - name: Create export options plist
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Create IPA archive
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        run: |
          cd ios/build/ipa
          zip -r fuego-wallet-iOS-Release.ipa Runner.ipa
          cd ../../..

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-ios
          path: |
            ios/build/ipa/fuego-wallet-iOS-Release.ipa
            build/ios/iphoneos/Runner.app
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ios/build/ipa/fuego-wallet-iOS-Release.ipa
          tag_name: ${{ github.ref_name }}
          name: fuego-wallet iOS Release ${{ github.ref_name }}

  upload-to-testflight:
    name: Upload to TestFlight
    runs-on: macos-latest
    needs: build-ios
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testflight == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-ios
          path: ./artifacts

      - name: Extract IPA
        run: |
          cd artifacts
          unzip fuego-wallet-iOS-Release.ipa
          cd ..

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: artifacts/Runner.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  upload-to-app-store:
    name: Upload to App Store
    runs-on: macos-latest
    needs: build-ios
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_app_store == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-ios
          path: ./artifacts

      - name: Extract IPA
        run: |
          cd artifacts
          unzip fuego-wallet-iOS-Release.ipa
          cd ..

      - name: Upload to App Store
        uses: apple-actions/upload-app-store@v1
        with:
          app-path: artifacts/Runner.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  security-scan:
    name: Security Scan
    runs-on: macos-latest
    needs: build-ios
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-ios
          path: ./artifacts

      - name: Extract IPA for analysis
        run: |
          cd artifacts
          unzip fuego-wallet-iOS-Release.ipa
          cd ..

      - name: Run iOS security analysis
        run: |
          echo "Running iOS security analysis..."
          if grep -r "password\|secret\|key\|token" ios/Runner/ --include="*.swift" --include="*.m" --include="*.h" | grep -v "//"; then
            echo "⚠️ Potential hardcoded secrets found"
          else
            echo "✅ No hardcoded secrets found"
          fi
          if grep -q "NSAppTransportSecurity" ios/Runner/Info.plist; then
            echo "✅ ATS configuration found"
          else
            echo "⚠️ ATS configuration not found"
          fi

      - name: Run Flutter security analysis
        run: |
          flutter analyze --fatal-infos

  code-quality:
    name: Code Quality Analysis
    runs-on: macos-latest
    needs: build-ios
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Run comprehensive analysis
        run: |
          flutter analyze --fatal-infos
          flutter test --coverage
          genhtml coverage/lcov.info -o coverage/html
          lcov --summary coverage/lcov.info

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: ios-coverage-report
          path: coverage/
          retention-days: 30

  notify-release:
    name: Notify Release
    runs-on: macos-latest
    needs: [build-ios, upload-to-testflight, upload-to-app-store]
    if: always() && github.event_name == 'release'

    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            🚀 **fuego-wallet iOS Release ${{ github.ref_name }}**

            ✅ iOS app build completed
            📱 Ready for distribution
            🔗 [Download from GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})

            **Build Details:**
            - Version: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
            - Platform: iOS
