name: fuego-wallet

on:
  push:
    branches: [master]
    paths:
      - 'rust-fuego-wallet/**'
      - '.github/workflows/fuego-wallet.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: fuego-wallet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with: { toolchain: stable }
      - name: Test
        working-directory: rust-fuego-wallet
        run: cargo test

  build-macos:
    name: Build macOS
    runs-on: macos-14
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-fuego-wallet/target
          key: rust-wallet-${{ runner.os }}-${{ hashFiles('rust-fuego-wallet/Cargo.lock') }}

      - name: Build
        working-directory: rust-fuego-wallet
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir release
          cp rust-fuego-wallet/target/aarch64-apple-darwin/release/fuego-wallet release/
          chmod +x release/fuego-wallet
          cd release && zip -r ../fuego-wallet-macos-arm64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuego-wallet-macos-arm64
          path: fuego-wallet-macos-arm64.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: fuego-wallet-macos-arm64.zip
