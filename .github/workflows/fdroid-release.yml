name: fuego-wallet F-Droid Build (Embedded SDK)

on:
  push:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "android/**"
      - "fuego-sdk/**"
      - "pubspec.yaml"
      - ".github/workflows/fdroid-release.yml"
  pull_request:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "android/**"
      - "fuego-sdk/**"
      - "pubspec.yaml"
      - ".github/workflows/fdroid-release.yml"
  workflow_dispatch:
  release:
    types: [published]
    permissions:
      contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.27.0"
  FUEGO_SOURCE_BRANCH: "hearth"

jobs:
  build-fdroid-apk:
    name: Build F-Droid APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Enable Android support
        run: flutter config --enable-android

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: false

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "native/crypto"

      - name: Build Rust crypto library
        run: |
          cd native/crypto
          cargo ndk -t aarch64-linux-android -o ../../assets/bin build --release
          cargo ndk -t armv7-linux-androideabi -o ../../assets/bin build --release
          cargo ndk -t i686-linux-android -o ../../assets/bin build --release
          cargo ndk -t x86_64-linux-android -o ../../assets/bin build --release

      - name: Copy Rust libraries to assets
        run: |
          mkdir -p assets/bin
          cp native/crypto/target/aarch64-linux-android/release/libfuego_crypto.so assets/bin/libfuego_crypto-arm64-v8a.so || true
          cp native/crypto/target/armv7-linux-androideabi/release/libfuego_crypto.so assets/bin/libfuego_crypto-armeabi-v7a.so || true
          cp native/crypto/target/i686-linux-android/release/libfuego_crypto.so assets/bin/libfuego_crypto-x86.so || true
          cp native/crypto/target/x86_64-linux-android/release/libfuego_crypto.so assets/bin/libfuego_crypto-x86_64.so || true

      - name: Ensure Binaries
        run: chmod +x scripts/ensure-binaries.sh && ./scripts/ensure-binaries.sh

      - name: Build Fuego Core & SDK (Android/F-Droid)
        run: |
          git clone -b ${{ env.FUEGO_SOURCE_BRANCH }} https://github.com/usexfg/fuego-suite.git fuego-core
          cd fuego-core
          git submodule update --init --recursive
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake libboost-all-dev libjsoncpp-dev libssl-dev libzmq3-dev
          sed -i 's/#include <json\/json.h>/#include <jsoncpp\/json.h>/g' src/CryptoNoteCore/ProofStructures.h
          
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          
          cd ../../fuego-sdk
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DFUEGO_DIR=../../fuego-core
          make -j$(nproc)
          
          mkdir -p ../../assets/bin
          cp libfuego_sdk.so ../../assets/bin/libfuego_sdk-android.so

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Analyze code
        run: flutter analyze

      - name: Build APK (Release - Unsigned for F-Droid)
        run: flutter build apk --release

      - name: Build APK (Split per ABI for smaller size)
        run: flutter build apk --split-per-abi --release

      - name: Rename APK files
        run: |
          cd build/app/outputs/flutter-apk
          if [ -f app-release.apk ]; then
            cp app-release.apk fuego-wallet-FDroid-Release.apk
          fi
          if [ -f app-arm64-v8a-release.apk ]; then
            cp app-arm64-v8a-release.apk fuego-wallet-FDroid-Release-arm64-v8a.apk
            cp app-armeabi-v7a-release.apk fuego-wallet-FDroid-Release-armeabi-v7a.apk
            cp app-x86_64-release.apk fuego-wallet-FDroid-Release-x86_64.apk
          fi

      - name: Generate APK checksums
        run: |
          cd build/app/outputs/flutter-apk
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-fdroid-apk
          path: |
            build/app/outputs/flutter-apk/fuego-wallet-FDroid-Release.apk
            build/app/outputs/flutter-apk/fuego-wallet-FDroid-Release-arm64-v8a.apk
            build/app/outputs/flutter-apk/fuego-wallet-FDroid-Release-armeabi-v7a.apk
            build/app/outputs/flutter-apk/fuego-wallet-FDroid-Release-x86_64.apk
            build/app/outputs/flutter-apk/SHA256SUMS.txt
          retention-days: 30
