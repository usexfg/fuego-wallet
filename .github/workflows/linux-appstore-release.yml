name: fuego-wallet Linux App Store Release (Embedded SDK)

on:
  push:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "linux/**"
      - "fuego-sdk/**"
      - "snapcraft.yaml"
      - "flatpak/**"
      - "pubspec.yaml"
      - ".github/workflows/linux-appstore-release.yml"
  pull_request:
    branches: [HEATMINT, master, azorahai]
    paths:
      - "lib/**"
      - "linux/**"
      - "fuego-sdk/**"
      - "snapcraft.yaml"
      - "flatpak/**"
      - "pubspec.yaml"
      - ".github/workflows/linux-appstore-release.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      distribution_method:
        description: "Distribution method"
        required: true
        default: "snap"
        type: choice
        options:
          - snap
          - flatpak
          - appimage
          - all
      upload_to_store:
        description: "Upload to store"
        required: false
        default: false
        type: boolean
  release:
    types: [published]
    permissions:
      contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.27.0"
  FUEGO_SOURCE_BRANCH: "hearth"
  SNAP_NAME: "xfg-wallet"
  FLATPAK_APP_ID: "com.fuego.fuego_wallet"

jobs:
  build-sdk-linux:
    name: Build Fuego SDK (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Fuego Core & SDK
        run: |
          git clone -b ${{ env.FUEGO_SOURCE_BRANCH }} https://github.com/usexfg/fuego-suite.git fuego-core
          cd fuego-core
          git submodule update --init --recursive
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake libboost-all-dev libjsoncpp-dev libssl-dev libzmq3-dev
          sed -i 's/set(BOOST_COMPONENTS system filesystem thread date_time chrono regex serialization program_options)/set(BOOST_COMPONENTS filesystem thread date_time chrono regex serialization program_options)/' CMakeLists.txt
          
          mkdir build && cd build
          cmake .. -DBUILD_TESTS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          
          cd ../../fuego-sdk
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DFUEGO_DIR=../../fuego-core
          make -j$(nproc)
          
          mkdir -p ../../assets/bin
          cp libfuego_sdk.so ../../assets/bin/libfuego_sdk-linux.so

      - name: Upload SDK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuego-sdk-linux
          path: assets/bin/libfuego_sdk-linux.so

  build-snap:
    name: Build fuego-wallet (Snap Store)
    runs-on: ubuntu-latest
    needs: build-sdk-linux
    if: github.event.inputs.distribution_method == 'snap' || github.event.inputs.distribution_method == 'all' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SDK
        uses: actions/download-artifact@v4
        with:
          name: fuego-sdk-linux
          path: assets/bin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Ensure Binaries
        run: chmod +x scripts/ensure-binaries.sh && ./scripts/ensure-binaries.sh

      - name: Enable Linux desktop support
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux desktop app
        run: flutter build linux --release

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap package
        run: snapcraft --destructive-mode

      - name: Upload Snap artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-snap
          path: |
            *.snap
            snap/snapcraft.yaml
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            *.snap
          tag_name: ${{ github.ref_name }}
          name: fuego-wallet Linux Snap ${{ github.ref_name }}

  build-flatpak:
    name: Build fuego-wallet (Flatpak)
    runs-on: ubuntu-latest
    needs: build-sdk-linux
    if: github.event.inputs.distribution_method == 'flatpak' || github.event.inputs.distribution_method == 'all' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SDK
        uses: actions/download-artifact@v4
        with:
          name: fuego-sdk-linux
          path: assets/bin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Ensure Binaries
        run: chmod +x scripts/ensure-binaries.sh && ./scripts/ensure-binaries.sh

      - name: Install Flatpak and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux desktop app
        run: flutter build linux --release

      - name: Build Flatpak package
        run: |
          flatpak-builder --repo=repo --force-clean build-dir flatpak/com.fuego.fuego_wallet.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo xfg-wallet.flatpak com.fuego.fuego_wallet

      - name: Upload Flatpak artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-flatpak
          path: |
            xfg-wallet.flatpak
            flatpak/
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: xfg-wallet.flatpak
          tag_name: ${{ github.ref_name }}
          name: fuego-wallet Linux Flatpak ${{ github.ref_name }}

  build-appimage:
    name: Build fuego-wallet (AppImage)
    runs-on: ubuntu-latest
    needs: build-sdk-linux
    if: github.event.inputs.distribution_method == 'appimage' || github.event.inputs.distribution_method == 'all' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SDK
        uses: actions/download-artifact@v4
        with:
          name: fuego-sdk-linux
          path: assets/bin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Ensure Binaries
        run: chmod +x scripts/ensure-binaries.sh && ./scripts/ensure-binaries.sh

      - name: Enable Linux desktop support
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
          flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux desktop app
        run: flutter build linux --release

      - name: Create AppImage
        run: |
          cd build/linux/x64/release/bundle
          curl -LO https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          cat > fuego-wallet.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=fuego-wallet
          Comment=Privacy-focused cryptocurrency wallet
          Exec=fuego_wallet
          Icon=fuego_wallet
          Categories=Finance;
          Terminal=false
          EOF
          
          cp ../../../../../app_icon_256.png fuego_wallet.png || echo "Using placeholder icon"
          ./appimagetool-x86_64.AppImage . fuego-wallet-Linux.AppImage
          rm -f appimagetool-x86_64.AppImage

      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xfg-wallet-appimage
          path: build/linux/x64/release/bundle/fuego-wallet-Linux.AppImage
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/linux/x64/release/bundle/fuego-wallet-Linux.AppImage
          tag_name: ${{ github.ref_name }}
          name: fuego-wallet Linux AppImage ${{ github.ref_name }}

  upload-to-snap-store:
    name: Upload to Snap Store
    runs-on: ubuntu-latest
    needs: build-snap
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_store == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Snap artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-snap
          path: ./artifacts

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Login to Snap Store
        run: echo "${{ secrets.SNAP_STORE_LOGIN }}" | snapcraft login --with -

      - name: Upload to Snap Store
        run: |
          cd artifacts
          snapcraft upload *.snap --release=stable

  upload-to-flathub:
    name: Upload to Flathub
    runs-on: ubuntu-latest
    needs: build-flatpak
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_store == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-flatpak
          path: ./artifacts

      - name: Install Flatpak and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Setup Flathub repository
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload to Flathub
        run: echo "Flatpak package ready for Flathub submission. Manual submission required."

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-snap, build-flatpak, build-appimage]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-snap
          path: ./artifacts/snap

      - name: Download Flatpak artifacts
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-flatpak
          path: ./artifacts/flatpak

      - name: Download AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          name: xfg-wallet-appimage
          path: ./artifacts/appimage

      - name: Run security analysis
        run: |
          echo "Running Linux App Store security analysis..."
          if [ -f "artifacts/snap/*.snap" ]; then
            echo "✅ Snap package found"
          fi
          if [ -f "artifacts/flatpak/xfg-wallet.flatpak" ]; then
            echo "✅ Flatpak package found"
          fi
          if [ -f "artifacts/appimage/fuego-wallet-Linux.AppImage" ]; then
            echo "✅ AppImage package found"
          fi

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs:
      [
        build-snap,
        build-flatpak,
        build-appimage,
        upload-to-snap-store,
        upload-to-flathub,
      ]
    if: always() && github.event_name == 'release'

    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            🚀 **fuego-wallet Linux App Store Release ${{ github.ref_name }}**

            ✅ Linux app store packages built
            📦 Available for Snap Store, Flatpak, and AppImage
            🔗 [Download from GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})

            **Build Details:**
            - Version: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
            - Platform: Linux App Stores
