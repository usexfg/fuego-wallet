name: SDK Build

on:
  push:
    branches: [azorahai]
    paths:
      - 'fuego-sdk/**'
      - 'fuego/**'
  pull_request:
    branches: [azorahai]
    paths:
      - 'fuego-sdk/**'
      - 'fuego/**'

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libssl-dev \
            libzmq3-dev \
            libqt5gui5 \
            libqt5widgets5 \
            libqt5network5 \
            qtbase5-dev

      - name: Configure CMake
        run: |
          cd fuego-sdk
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/sdk-install

      - name: Build
        run: |
          cd fuego-sdk/build
          make -j$(nproc)

      - name: Install
        run: |
          cd fuego-sdk/build
          make install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-sdk-linux
          path: sdk-install/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install boost openssl zmq qt@5 cmake

      - name: Configure CMake
        run: |
          cd fuego-sdk
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/sdk-install \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)

      - name: Build
        run: |
          cd fuego-sdk/build
          make -j$(sysctl -n hw.ncpu)

      - name: Install
        run: |
          cd fuego-sdk/build
          make install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-sdk-macos
          path: sdk-install/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install boost-msvc-14.3 cmake qt5 --no-progress

      - name: Configure CMake
        run: |
          cd fuego-sdk
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}\sdk-install `
            -DBOOST_ROOT="C:/local/boost" `
            -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64"

      - name: Build
        run: |
          cd fuego-sdk/build
          cmake --build . --config ${{env.BUILD_TYPE}} -j $env:NUMBER_OF_PROCESSORS

      - name: Install
        run: |
          cd fuego-sdk/build
          cmake --install . --config ${{env.BUILD_TYPE}} --prefix ${{github.workspace}}\sdk-install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-sdk-windows
          path: sdk-install/

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-all-dev \
            libssl-dev

      - name: Configure CMake (ARM64)
        run: |
          cd fuego-sdk
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NATIVE_API_LEVEL=24 \
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/sdk-install-android

      - name: Build (ARM64)
        run: |
          cd fuego-sdk/build-android
          make -j$(nproc)

      - name: Install
        run: |
          cd fuego-sdk/build-android
          make install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-sdk-android-arm64
          path: sdk-install-android/

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install boost openssl cmake

      - name: Configure CMake (iOS)
        run: |
          cd fuego-sdk
          mkdir build-ios && cd build-ios
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/sdk-install-ios

      - name: Build
        run: |
          cd fuego-sdk/build-ios
          make -j$(sysctl -n hw.ncpu)

      - name: Install
        run: |
          cd fuego-sdk/build-ios
          make install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuego-sdk-ios
          path: sdk-install-ios/

  dart-package:
    runs-on: ubuntu-22.04
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: |
          cd fuego-sdk/dart
          flutter pub get

      - name: Analyze
        run: |
          cd fuego-sdk/dart
          flutter analyze

      - name: Run tests
        run: |
          cd fuego-sdk/dart
          flutter test

      - name: Build package
        run: |
          cd fuego-sdk/dart
          flutter pub publish --dry-run
