name: fuego
description: "Fuego Wallet & DEX — Privacy banking, CDs, and cross-chain trading"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Fuego Core ──

  # ── State Management ──
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7
  get_it: ^8.0.3

  # ── UI and Navigation ──
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296

  # ── HTTP and JSON ──
  http: ^1.4.0
  dio: ^5.4.0
  json_annotation: ^4.9.0

  # ── Crypto and Security ──
  crypto: ^3.0.6
  cryptography: ^2.5.0
  flutter_secure_storage: ^10.0.0-beta.4
  local_auth: ^2.3.0
  bip39: ^1.0.6
  ed25519_hd_key: ^2.2.0

  # ── QR Code ──
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # ── File / Path ──
  file_picker: ^8.0.0+1
  path: ^1.9.1
  path_provider: ^2.1.5

  # ── FFI ──
  ffi: ^2.1.3

  # ── UI Components ──
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  auto_size_text: ^3.0.0
  flutter_svg: ^2.0.16

  # ── System ──
  url_launcher: ^6.2.4
  device_info_plus: ^10.1.0
  connectivity_plus: ^5.0.2

  # ── Charts ──
  imp_trading_chart: ^0.1.2

  # ── Notifications / Logging ──
  flutter_local_notifications: ^17.0.0
  logging: ^1.3.0

  # ── Storage ──
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.2
  shared_preferences: ^2.3.2
  dns_client: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
    - assets/bin/
    - assets/data/
    - assets/charts/

dependency_overrides:
